appId: com.catalogstudio.app
productName: Catalog Studio
# Fijo explícitamente la versión: electron-builder no resuelve node_modules
# hacia arriba en un workspace npm, así que no encuentra el electron hospedado
# en la raíz del monorepo y falla si aquí queda como rango ("^33.2.0").
electronVersion: 33.4.11
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - dist-electron/**
  - build/icon.png
  - build/catalog.empty.db
  - build/default-images/**
  - package.json
# Sin asar: los workspaces npm usan symlinks (packages/* <- node_modules/@catalog-studio/*)
# que quedan fuera del directorio base del asar, y el motor nativo de Prisma
# tampoco puede ejecutarse empaquetado dentro de un asar.
asar: false
extraResources:
  - from: ../../data
    to: data
    filter:
      - '!catalog.db'
      - '!images/**'
  # node_modules/.prisma queda hoisteado en la raíz del monorepo (npm workspaces)
  # y electron-builder no lo resuelve como parte del árbol de dependencias de
  # la app, así que hay que copiarlo a mano dentro de resources/app (con asar
  # desactivado, "app" es la carpeta donde vive el código fuente empaquetado).
  - from: ../../node_modules/.prisma
    to: app/node_modules/.prisma
  # Playwright normalmente descarga el navegador en el caché global de la
  # máquina de desarrollo (%LOCALAPPDATA%\ms-playwright) vía postinstall de
  # npm. Un usuario final que instala el .exe empaquetado no tiene npm ni
  # internet garantizado, así que hay que llevar el navegador dentro del
  # instalador. El script "prebuild" (ver package.json) copia el navegador
  # del caché local a build/ms-playwright antes de este paso. En tiempo de
  # ejecución, `PLAYWRIGHT_BROWSERS_PATH` (electron/main/index.ts) apunta a
  # la copia empaquetada cuando la app está instalada.
  - from: build/ms-playwright
    to: ms-playwright
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target: dmg
linux:
  target: AppImage
